services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: lintel
      POSTGRES_PASSWORD: lintel
      POSTGRES_DB: lintel
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lintel"]
      interval: 2s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:6333/healthz"]
      interval: 2s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
  qdrant_data:
