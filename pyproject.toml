[project]
name = "lintel-workspace"
version = "0.1.0"
requires-python = ">=3.12"

[tool.uv.workspace]
members = ["packages/*"]

[tool.ruff]
line-length = 100
target-version = "py312"
extend-exclude = ["tests/fixtures"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "UP", "ANN", "B", "A", "SIM", "TCH", "RUF"]

[tool.ruff.lint.isort]
force-sort-within-sections = true
known-first-party = ["lintel"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
addopts = "--import-mode=importlib"
timeout = 30
testpaths = [
    "packages/contracts/tests",
    "packages/agents/tests",
    "packages/workflows/tests",
    "packages/app/tests",
    "packages/event-store/tests",
    "packages/event-bus/tests",
    "packages/persistence/tests",
