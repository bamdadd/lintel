[[tool.mypy.overrides]]
module = ["asyncpg", "asyncpg.*"]
ignore_missing_imports = true
follow_untyped_imports = true

[[tool.mypy.overrides]]
module = ["aioboto3", "aioboto3.*"]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = [
    "lintel.skills_api.integration_scanning",
    "lintel.integration_patterns_api",
    "lintel.integration_patterns_api.*",
]
ignore_missing_imports = true
follow_untyped_imports = true

[[tool.mypy.overrides]]
module = [
    "lintel.event_store.postgres",
    "lintel.event_store.migrate",
    "lintel.persistence.vault.postgres_vault",
]
disallow_untyped_calls = false

[dependency-groups]
dev = [
    "anthropic[bedrock]>=0.84.0",
    "pytest-xdist>=3.8.0",
    "pytest>=8.3",
    "pytest-asyncio>=0.24",
    "pytest-cov>=6.0",
    "pytest-testmon>=2.1",
    "pytest-timeout>=2.3",
    "testcontainers[postgres,nats]>=4.9",
    "ruff>=0.8",
    "mypy>=1.13",
    "pre-commit>=4.0",
    "qdrant-client>=1.9",
    "mkdocs-material>=9.7.6",
    "pymdown-extensions>=10.21.2",
]
