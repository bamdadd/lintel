[project]
name = "lintel-workspace"
version = "0.1.0"
requires-python = ">=3.12"

[tool.uv.workspace]
members = ["packages/*"]

[tool.ruff]
line-length = 100
target-version = "py312"
extend-exclude = ["tests/fixtures"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "UP", "ANN", "B", "A", "SIM", "TCH", "RUF"]

[tool.ruff.lint.isort]
force-sort-within-sections = true
known-first-party = ["lintel"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
addopts = "--import-mode=importlib"
testpaths = [
    "packages/contracts/tests",
    "packages/domain/tests",
    "packages/agents/tests",
    "packages/infrastructure/tests",
    "packages/workflows/tests",
    "packages/app/tests",
    "tests",
]

[tool.mypy]
python_version = "3.12"
strict = true
plugins = ["pydantic.mypy"]
namespace_packages = true
explicit_package_bases = true
mypy_path = [
    "packages/contracts/src",
    "packages/domain/src",
    "packages/agents/src",
    "packages/infrastructure/src",
    "packages/workflows/src",
    "packages/app/src",
]

[[tool.mypy.overrides]]
module = ["asyncpg", "asyncpg.*"]
ignore_missing_imports = true
follow_untyped_imports = true

[[tool.mypy.overrides]]
module = [
    "lintel.infrastructure.event_store.postgres",
    "lintel.infrastructure.event_store.migrate",
    "lintel.infrastructure.vault.postgres_vault",
]
disallow_untyped_calls = false

[dependency-groups]
dev = [
    "anthropic[bedrock]>=0.84.0",
    "pytest-xdist>=3.8.0",
    "pytest>=8.3",
    "pytest-asyncio>=0.24",
    "pytest-cov>=6.0",
    "pytest-testmon>=2.1",
    "testcontainers[postgres,nats]>=4.9",
    "ruff>=0.8",
    "mypy>=1.13",
    "pre-commit>=4.0",
]
