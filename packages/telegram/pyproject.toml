[project]
name = "lintel-telegram"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "lintel-contracts",
    "lintel-channels",
    "aiogram>=3.13",
    "structlog>=24.4",
    "httpx>=0.27",
]

[tool.uv.sources]
lintel-contracts = { workspace = true }
lintel-channels = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
only-include = ["src/lintel/telegram"]

[tool.hatch.build.targets.wheel.sources]
"src" = ""
