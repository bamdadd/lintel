[project]
name = "lintel-models"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "lintel-contracts",
    "structlog>=24.4",
    "litellm>=1.55",
    "httpx>=0.28",
    "tenacity>=9.0",
]

[tool.uv.sources]
lintel-contracts = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
only-include = ["src/lintel/models"]

[tool.hatch.build.targets.wheel.sources]
"src" = ""
