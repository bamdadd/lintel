[project]
name = "lintel-domain"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "lintel-contracts",
    "structlog>=24.4",
    "langgraph>=0.3",
    "croniter>=6.0.0",
]

[tool.uv.sources]
lintel-contracts = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
only-include = ["src/lintel/domain"]

[tool.hatch.build.targets.wheel.sources]
"src" = ""
