[project]
name = "lintel-encryption-api"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "lintel-api-support",
    "cryptography>=44.0",
    "fastapi>=0.115",
    "pydantic>=2.10",
    "structlog>=24.4",
]

[tool.uv.sources]
lintel-api-support = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
only-include = ["src/lintel/encryption_api"]

[tool.hatch.build.targets.wheel.sources]
"src" = ""
