[project]
name = "lintel-stage-catalogue-api"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "lintel-workflows",
    "fastapi>=0.115",
    "pydantic>=2.10",
]

[tool.uv.sources]
lintel-workflows = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
only-include = ["src/lintel/stage_catalogue_api"]

[tool.hatch.build.targets.wheel.sources]
"src" = ""
