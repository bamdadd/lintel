[project]
name = "lintel-auth-api"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "lintel-domain",
    "lintel-api-support",
    "fastapi>=0.115",
    "pydantic>=2.10",
    "PyJWT>=2.9",
    "bcrypt>=4.2",
]

[tool.uv.sources]
lintel-domain = { workspace = true }
lintel-api-support = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
only-include = ["src/lintel/auth_api"]

[tool.hatch.build.targets.wheel.sources]
"src" = ""
