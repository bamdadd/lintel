[project]
name = "lintel-slack"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "lintel-contracts",
    "structlog>=24.4",
    "slack-bolt>=1.21",
    "slack-sdk>=3.33",
]

[tool.uv.sources]
lintel-contracts = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
only-include = ["src/lintel/slack"]

[tool.hatch.build.targets.wheel.sources]
"src" = ""
