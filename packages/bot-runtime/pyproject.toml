[project]
name = "lintel-bot-runtime"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "lintel-contracts",
    "lintel-domain",
    "lintel-bots-api",
    "lintel-channels",
    "structlog>=24.4",
]

[tool.uv.sources]
lintel-contracts = { workspace = true }
lintel-domain = { workspace = true }
lintel-bots-api = { workspace = true }
lintel-channels = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
only-include = ["src/lintel/bot_runtime"]

[tool.hatch.build.targets.wheel.sources]
"src" = ""
