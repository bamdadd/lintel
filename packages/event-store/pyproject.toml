[project]
name = "lintel-event-store"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "lintel-contracts",
    "structlog>=24.4",
    "asyncpg>=0.30",
]

[tool.uv.sources]
lintel-contracts = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
only-include = ["src/lintel/event_store"]

[tool.hatch.build.targets.wheel.sources]
"src" = ""
