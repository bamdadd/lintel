[project]
name = "lintel-agents"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "lintel-contracts",
    "lintel-models",
    "lintel-sandbox",
    "structlog>=24.4",
    "litellm>=1.55",
]

[tool.uv.sources]
lintel-contracts = { workspace = true }
lintel-models = { workspace = true }
lintel-sandbox = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
only-include = ["src/lintel/agents"]

[tool.hatch.build.targets.wheel.sources]
"src" = ""
