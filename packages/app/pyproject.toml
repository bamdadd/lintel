[project]
name = "lintel"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "lintel-contracts",
    "lintel-domain",
    "lintel-agents",
    "lintel-infrastructure",
    "fastapi>=0.115",
    "uvicorn[standard]>=0.34",
    "langgraph>=0.3",
    "langgraph-checkpoint-postgres>=2.0",
    "pydantic>=2.10",
    "pydantic-settings>=2.7",
    "structlog>=24.4",
]

[tool.uv.sources]
lintel-contracts = { workspace = true }
lintel-domain = { workspace = true }
lintel-agents = { workspace = true }
lintel-infrastructure = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
only-include = ["src/lintel"]

[tool.hatch.build.targets.wheel.sources]
"src" = ""
