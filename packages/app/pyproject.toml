[project]
name = "lintel"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "lintel-contracts",
    "lintel-agents",
    "lintel-infrastructure",
    "lintel-workflows",
    "lintel-event-store",
    "lintel-event-bus",
    "lintel-persistence",
    "lintel-sandbox",
    "lintel-pii",
    "lintel-observability",
    "lintel-models",
    "lintel-slack",
    "lintel-repos",
    "lintel-coordination",
    "lintel-projections",
    "lintel-api-support",
    "lintel-users",
    "lintel-teams",
    "lintel-policies-api",
    "lintel-notifications-api",
    "lintel-environments-api",
    "lintel-variables-api",
    "lintel-credentials-api",
    "lintel-audit-api",
    "fastapi>=0.115",
    "uvicorn[standard]>=0.34",
    "langgraph>=0.3",
    "langgraph-checkpoint-postgres>=2.0",
    "pydantic>=2.10",
    "pydantic-settings>=2.7",
    "structlog>=24.4",
    "dependency-injector>=4.48.3",
    "croniter>=6.0.0",
    "fastapi-mcp>=0.4.0",
    "nats-py>=2.9",
]

[tool.uv.sources]
lintel-contracts = { workspace = true }
lintel-agents = { workspace = true }
lintel-infrastructure = { workspace = true }
lintel-workflows = { workspace = true }
lintel-event-store = { workspace = true }
lintel-event-bus = { workspace = true }
lintel-persistence = { workspace = true }
lintel-sandbox = { workspace = true }
lintel-pii = { workspace = true }
lintel-observability = { workspace = true }
lintel-models = { workspace = true }
lintel-slack = { workspace = true }
lintel-repos = { workspace = true }
lintel-coordination = { workspace = true }
lintel-projections = { workspace = true }
lintel-api-support = { workspace = true }
lintel-users = { workspace = true }
lintel-teams = { workspace = true }
lintel-policies-api = { workspace = true }
lintel-notifications-api = { workspace = true }
lintel-environments-api = { workspace = true }
lintel-variables-api = { workspace = true }
lintel-credentials-api = { workspace = true }
lintel-audit-api = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
only-include = ["src/lintel"]

[tool.hatch.build.targets.wheel.sources]
"src" = ""
