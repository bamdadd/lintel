[project]
name = "lintel-infrastructure"
version = "0.1.0"
requires-python = ">=3.12"
description = "Infrastructure implementations: MCP tool client, artifact stores."
dependencies = [
    "structlog>=24.4",
    "httpx>=0.28",
    "lintel-contracts",
]

[project.optional-dependencies]
s3 = ["aioboto3>=13"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
only-include = ["src/lintel/infrastructure/mcp", "src/lintel/infrastructure/stores"]

[tool.hatch.build.targets.wheel.sources]
"src" = ""

[tool.uv.sources]
lintel-contracts = { workspace = true }
