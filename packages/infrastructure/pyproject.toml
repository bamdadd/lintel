[project]
name = "lintel-infrastructure"
version = "0.1.0"
requires-python = ">=3.12"
description = "Residual package — contains only MCP tool client. Will be fully dissolved in a future release."
dependencies = [
    "structlog>=24.4",
    "httpx>=0.28",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
only-include = ["src/lintel/infrastructure/mcp"]

[tool.hatch.build.targets.wheel.sources]
"src" = ""
