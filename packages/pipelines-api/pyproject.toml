[project]
name = "lintel-pipelines-api"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "lintel-contracts",
    "lintel-domain",
    "lintel-api-support",
    "lintel-persistence",
    "lintel-workflows",
    "lintel-event-bus",
    "fastapi>=0.115",
    "pydantic>=2.10",
    "structlog>=24.4",
]

[tool.uv.sources]
lintel-contracts = { workspace = true }
lintel-domain = { workspace = true }
lintel-api-support = { workspace = true }
lintel-persistence = { workspace = true }
lintel-workflows = { workspace = true }
lintel-event-bus = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
only-include = ["src/lintel/pipelines_api"]

[tool.hatch.build.targets.wheel.sources]
"src" = ""
