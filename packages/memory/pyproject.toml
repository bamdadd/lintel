[project]
name = "lintel-memory"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "lintel-contracts",
    "qdrant-client>=1.9",
    "pydantic>=2.0",
    "structlog>=24.0",
]

[tool.uv.sources]
lintel-contracts = { workspace = true }

[tool.hatch.build.targets.wheel]
packages = ["src/lintel"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
addopts = "--import-mode=importlib"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.backends"
