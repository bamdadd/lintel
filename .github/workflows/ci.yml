name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: make install
      - run: make lint
      - run: make typecheck

  test-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: make install
      # PRs: only test affected packages. Main: test everything.
      - name: Run affected tests (PR)
        if: github.event_name == 'pull_request'
        run: make test-affected BASE_REF=origin/${{ github.base_ref }}
      - name: Run all tests (main)
        if: github.event_name == 'push'
        run: make test-unit

  test-integration:
    runs-on: ubuntu-latest
    # Only run integration tests on main pushes
    if: github.event_name == 'push'
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: lintel
          POSTGRES_USER: lintel
          POSTGRES_PASSWORD: lintel
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: make install
      - run: make test-integration
        env:
          LINTEL_DB_DSN: postgresql://lintel:lintel@localhost:5432/lintel
