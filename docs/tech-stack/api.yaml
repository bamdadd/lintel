tech_area: api
display_name: API & Domain Layer
description: >
  FastAPI REST API with event-sourced CQRS architecture. Handles all HTTP endpoints,
  domain types, event processing, projections, and workflow orchestration.

task_runner: make
dependency_manager: uv

clean_code_path: docs/clean-code/python/

