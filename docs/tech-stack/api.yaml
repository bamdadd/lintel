deployment:
  platform: github-actions
  workflows:
    - path: .github/workflows/ci.yml
      description: Lint, typecheck, and test on push/PR to main
  infrastructure:
    - path: Dockerfile
      description: Production container image
    - path: docker-compose.yml
      description: Local development stack (Postgres, NATS, app)

development:
  taskfile: Makefile
  linting:
    - tool: ruff
      config_path: pyproject.toml
  formatting:
    - tool: ruff
      config_path: pyproject.toml
  testing:
    tool: pytest
    config_path: pyproject.toml
  type_checking:
    tool: mypy
    config_path: pyproject.toml

pattern_categories:
  - event-sourcing
  - cqrs
  - clean-architecture
  - dependency-injection
  - protocol-interfaces
  - frozen-dataclasses
  - in-memory-stores

best_practice_categories:
  - api-design
  - error-handling
  - testing
  - security
  - pii-handling
  - observability

anti_pattern_hints:
  - importing-infrastructure-from-domain
  - mutable-domain-objects
  - leaky-abstractions
  - missing-correlation-ids
  - exposing-secrets-in-responses

related_docs:
  - path: docs/architecture.md
    description: System architecture overview
  - path: docs/events.md
    description: Event reference for all domain events
  - path: docs/local-dev.md
    description: Local development setup guide
